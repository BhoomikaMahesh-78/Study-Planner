<!DOCTYPE html>
<html>
<head>
<title>Smart Study Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Smart Study Planner</h1>

<div class="container">

<input type="text" id="subject" placeholder="Subject Name">
<input type="text" id="task" placeholder="Study Task">
<input type="time" id="deadline">

<button onclick="addTask()">Add Task</button>

<h3>Task List</h3>
<ul id="taskList"></ul>

<div class="counter">
<p>Total Tasks: <span id="total">0</span></p>
<p>Completed: <span id="completed">0</span></p>
<p>Remaining: <span id="remaining">0</span></p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
